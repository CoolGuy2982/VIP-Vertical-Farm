# VIP Vertical Farm — AI Grower Configuration

plant:
  species: "Lettuce"
  variety: "Diversified Lettuce Tray"
  planted_date: "2026-04-06"
  growth_stages:
    - name: "germination"
      typical_days: [0, 7]
      ideal_temp_c: [22, 28]
      ideal_humidity_pct: [70, 90]
      ideal_soil_moisture_pct: [60, 80]
      light_hours: 0
    - name: "seedling"
      typical_days: [7, 21]
      ideal_temp_c: [20, 26]
      ideal_humidity_pct: [60, 75]
      ideal_soil_moisture_pct: [50, 70]
      light_hours: 14
    - name: "vegetative"
      typical_days: [21, 60]
      ideal_temp_c: [20, 28]
      ideal_humidity_pct: [50, 70]
      ideal_soil_moisture_pct: [40, 65]
      light_hours: 16
    - name: "mature"
      typical_days: [60, 999]
      ideal_temp_c: [20, 28]
      ideal_humidity_pct: [40, 60]
      ideal_soil_moisture_pct: [35, 55]
      light_hours: 14

# Hardware Specifications
hardware_specs:
  flow_rate_ml_s: 168
  tray_tilt_degrees: 19

# GPIO pin numbers (BOARD — Jetson Orin Nano 40-pin header)
# VCC → Pin 2 (5V), GND → Pin 6
# Signal Pins: Light = 13  (Pump is now Kasa cloud — see kasa_cloud section below)
gpio:
  grow_light_pin: 13    # Relay → grow light (BOARD Pin 13, Active-Low)
  dashboard_relay_pin: 22 # Not used (dashboard always on)

# TP-Link Kasa cloud control — water pump smart plug
# Credentials are in .env (KASA_USERNAME / KASA_PASSWORD)
# device_alias must exactly match the name shown in the Kasa mobile app
kasa_cloud:
  device_alias: "Water Pump"

# No hardware sensors -- the AI reads values from the tent dashboard camera

# Water pump calibration
water_pump:
  min_seconds_per_dose: 1
  max_seconds_per_dose: 60   # Never run longer than 60s in one shot

# Grow light
light:
  max_on_minutes: 1440       # 24h max (safety cap)

# Cameras (two USB webcams)
camera:
  plant_cam_index: 0        # USB webcam pointed at the plant
  dashboard_cam_index: 2    # USB webcam pointed at the tent dashboard
  resolution: [1280, 720]
  image_dir: "data/images"
  plant_rotation: 90    # 0=none, 90=CW, 180=flip, 270=CCW

# Gemini API
gemini:
  model: "gemini-3-flash-preview"
  max_output_tokens: 4096
  thinking: true

# Context / memory management
context:
  max_recent_decisions: 15
  compression_interval_hours: 24
  sensor_trend_hours: 24

# Scheduler
scheduler:
  min_checkin_minutes: 1
  max_checkin_minutes: 480

# Local API server
api:
  host: "0.0.0.0"
  port: 8080

# Firebase cloud backup
firebase:
  enabled: true
  credentials_path: "firebase-credentials.json"
  storage_bucket: "vip-farm-35099.firebasestorage.app"
  device_id: "jetson-grower-01"

# Alerts
alerts:
  critical_temp_c: [5, 40]
  critical_moisture_pct: [10, 95]
